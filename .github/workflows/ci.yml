name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Frontend: lint + typecheck + unit tests
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend (lint · typecheck · test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Unit tests
        run: npm test -- --reporter=verbose

  # ─────────────────────────────────────────────
  # Backend: typecheck + unit tests
  # ─────────────────────────────────────────────
  backend:
    name: Backend (typecheck · test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: neon
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: neon_arsenal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: server

    env:
      DATABASE_URL: postgresql://neon:ci_password@localhost:5432/neon_arsenal_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --reporter=verbose

  # ─────────────────────────────────────────────
  # Build verification (frontend)
  # ─────────────────────────────────────────────
  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          VITE_API_URL: https://api.example.com
