# Neon Arsenal Market — Docker Compose
#
# Development (with hot-reload frontend):
#   docker compose --profile dev up --build
#
# API + DB only (e.g. for testing):
#   docker compose up --build
#
# Environment variables are loaded from .env in the project root.
# Copy .env.example to .env and fill in the values before running.

services:

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: neon-arsenal-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-neon_arsenal}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neon} -d ${POSTGRES_DB:-neon_arsenal}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Backend API ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: neon-arsenal-api:latest
    container_name: neon-arsenal-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      RATE_LIMIT_API_MAX: ${RATE_LIMIT_API_MAX:-10000}
      RATE_LIMIT_AUTH_MAX: ${RATE_LIMIT_AUTH_MAX:-100}
      DATABASE_URL: postgresql://${POSTGRES_USER:-neon}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-neon_arsenal}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_SECRET: ${PAYPAL_SECRET:-}
      PAYPAL_MODE: ${PAYPAL_MODE:-sandbox}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─── Frontend Dev Server (hot-reload) ─────────────────────────────────────
  # Only started with: docker compose --profile dev up
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
    image: neon-arsenal-frontend:dev
    container_name: neon-arsenal-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - dev

volumes:
  db-data:
    driver: local
