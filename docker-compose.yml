# Neon Arsenal Market — Docker Compose
# Usage: docker compose up --build
#
# Services:
#   api      — Express backend (port 3001)
#   frontend — Vite frontend (port 5173, dev only)
#
# For production, set NODE_ENV=production and configure the env variables below.

services:
  # ─── Backend API ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: neon-arsenal-api:latest
    container_name: neon-arsenal-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: file:/app/data/dev.db
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_SECRET: ${PAYPAL_SECRET:-}
      PAYPAL_MODE: ${PAYPAL_MODE:-sandbox}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    volumes:
      # Persist SQLite database outside the container
      - api-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Frontend (Dev only) ──────────────────────────────────────────────────
  # Comment out or override in docker-compose.prod.yml for production.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: dev
    image: neon-arsenal-frontend:dev
    container_name: neon-arsenal-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      # Mount source for HMR
      - .:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - dev

volumes:
  api-data:
    driver: local
