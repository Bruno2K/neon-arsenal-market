# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect repo on Render dashboard and select this file.
#
# Services provisioned:
#   - neon-arsenal-api  (Web Service — Express backend)
#   - neon-arsenal-db   (PostgreSQL — managed, free tier)

services:
  - type: web
    name: neon-arsenal-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: neon-arsenal-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: PAYPAL_CLIENT_ID
        sync: false
      - key: PAYPAL_SECRET
        sync: false
      - key: PAYPAL_MODE
        value: sandbox
      - key: PAYPAL_WEBHOOK_ID
        sync: false
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: neon-arsenal-db
    databaseName: neon_arsenal
    user: neon
    plan: free
